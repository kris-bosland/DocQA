name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: >
          dotnet test DocQA.Tests.Unit/DocQA.Tests.Unit.csproj
          --no-build --configuration Release
          --logger "console;verbosity=normal"

      - name: Run acceptance tests
        run: >
          dotnet test DocQA.Tests.Acceptance/DocQA.Tests.Acceptance.csproj
          --no-build --configuration Release
          --logger "console;verbosity=normal"
        env:
          ASPNETCORE_ENVIRONMENT: Testing

  deploy-api:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish server
        run: dotnet publish DocQA.Server/DocQA.Server.csproj -c Release -o publish/server

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: docqa-server-krisbbb
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish/server

  deploy-client:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ./DocQA.Client
          api_location: ""
          output_location: wwwroot
